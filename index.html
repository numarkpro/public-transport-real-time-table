<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reāllaika dati</title>
  <link rel="stylesheet" href="./main.css">
</head>
<body>
  <div class="wrap">

    <div class="topbar">
      <h1>Reāllaika dati</h1>
      <div class="statusbar">
        <div class="pill" id="clock">--:--:--</div>
        <div class="pill" id="last-update">Pēdējais atjauninājums: --</div>
        <div class="pill-progress" id="pill-prog">
          <div class="pill-progress-fill" id="pill-fill" style="width:100%"></div>
          <span class="pill-progress-text" id="pill-label">Atjaunināšana pēc 10 sek</span>
        </div>
      </div>
    </div>

    <div class="grid" id="board"></div>

  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6hHjLtlspRI1wuFPvuGXEu0eRYjF19f1j2h9jzCg9QKzLWRbB6ZP07TU8kYmx3FdKIA/exec';
    const REFRESH_MS = 10000;
    let nextRefresh = Date.now() + REFRESH_MS;

    const transportClass = t =>
      ({ bus: 'bus', trol: 'trol', tram: 'tram', train: 'train' }[t] ?? 'other');

    const transportLabel = t =>
      ({ bus:   `<span class="temaki--bus"></span>`,
         trol:  `<span class="temaki--trolleybus"></span>`,
         tram:  `<span class="temaki--tram"></span>`,
         train: `<span class="temaki--train-bullet"></span>`
       }[t] ?? '?');

    const etaClass  = m => m < 0 ? 'overdue' : m <= 1 ? 'arrive' : m <= 5 ? 'soon' : 'normal';
    const formatEta = m => {
      if (m < 0)  return 'Aizbr';
      if (m <= 0) return 'Pienāk';
      if (m >= 60) return `${Math.floor(m / 60)}h ${m % 60}`;
      return String(m);
    };

    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('lv-LV');
    }

    function updateProgress() {
      const remaining = Math.max(0, nextRefresh - Date.now());
      const pct = (remaining / REFRESH_MS) * 100;
      const sec = Math.ceil(remaining / 1000);
      document.getElementById('pill-fill').style.width = pct + '%';
      document.getElementById('pill-label').textContent = `Atjaunināšana pēc ${sec} sek`;
    }

    function renderStopCard(item, limit = 6) {
      const stop = item.stop;
      const deps = Array.isArray(item.departures) ? item.departures : [];

      const rows = deps.length
        ? deps.slice(0, limit).map(dep => `
            <div class="row">
              <div class="badge ${transportClass(dep.type)}">
                ${transportLabel(dep.type)}${dep.route}
              </div>
              <div>
                <div class="main-line">${dep.destination}</div>
                <div class="dest">
                  ${dep.type === 'train'
                    ? (dep.origin ? 'no ' + dep.origin : '')
                    : dep.transport_id}
                </div>
              </div>
              <div class="eta ${etaClass(dep.scheduled_min)}">
                ${formatEta(dep.scheduled_min)}
                ${dep.scheduled_min > 0 ? '<small>min</small>' : ''}
              </div>
            </div>`).join('')
        : '<div class="nodata">Nav reāllaika datu attiecībā uz šo pieturu.</div>';

      return `
        <div class="card ${stop.group ? 'grouped' : ''}">
          <div class="head">
            <div class="stop-name">${stop.street || 'Pietura'}</div>
            <div class="stop-meta">
              <span>"${stop.name}"</span>
              <span>${stop.direction || ''}</span>
            </div>
          </div>
          <div class="list">${rows}</div>
        </div>`;
    }

    function groupStops(stops) {
      const pairs   = [['0155', '0154']];
      const pairMap = {};
      pairs.forEach(([a, b]) => { pairMap[a] = b; pairMap[b] = a; });

      const used   = new Set();
      const groups = [];

      for (const item of stops) {
        const id = item.stop.id;
        if (used.has(id)) continue;

        const pairedId   = pairMap[id];
        const pairedItem = pairedId ? stops.find(s => s.stop.id === pairedId) : null;

        if (pairedItem) {
          groups.push([item, pairedItem]);
          used.add(id);
          used.add(pairedId);
        } else {
          groups.push([item]);
          used.add(id);
        }
      }
      return groups;
    }

    async function loadBoard() {
      const board = document.getElementById('board');
      try {
        // Apps Script требует ?action=all (GET параметр)
        const url = APPS_SCRIPT_URL + '?action=all';
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        board.innerHTML = groupStops(data.stops).map(group => {
          if (group.length === 2) {
            return `<div class="card-pair">
              ${renderStopCard(group[0], 2)}
              ${renderStopCard(group[1], 2)}
            </div>`;
          }
          return renderStopCard(group[0], 6);
        }).join('');

        document.getElementById('last-update').textContent =
          'Pēdējais atjauninājums: ' + new Date().toLocaleTimeString('lv-LV');

      } catch (err) {
        board.innerHTML = `
          <div class="card" style="grid-column:1/-1;min-height:180px;">
            <div class="error">
              Kļūda ielādē: ${err.message}.<br>
              Pārbaudiet, vai Apps Script ir pareizi konfigurēts un URL ir nomainīts.
            </div>
          </div>`;
      }
    }

    async function refresh() {
      await loadBoard();
      nextRefresh = Date.now() + REFRESH_MS;
    }

    updateClock();
    updateProgress();
    setInterval(updateClock, 1000);
    setInterval(updateProgress, 100);
    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
